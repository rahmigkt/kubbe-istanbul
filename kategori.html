<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çekimler — KUBBE İSTANBUL</title>
<link rel="icon" href="assets/logo/mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Domine:wght@500;600;700&family=Nunito+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/brand.css?v=3">
<style>
  .page-hero{padding:160px 0 60px; border-bottom:1px solid var(--hairline);}
  .breadcrumb{font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--label); margin-bottom:18px;}
  .breadcrumb a{color:var(--coral); text-decoration:none;}
  .page-hero h1{font-family:'Domine', serif; font-weight:600; font-size:clamp(34px,5vw,58px); margin:0 0 14px;}
  .page-hero p{max-width:600px; color:var(--ink-dim); font-size:17px; margin:0;}

  .product-grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:1px; background:var(--hairline); border:1px solid var(--hairline); margin:60px 0;}
  .p-card{background:var(--bg); text-decoration:none; color:var(--ink); display:flex; flex-direction:column;}
  .p-card:hover{background:var(--bg-panel-2);}
  .p-card .img-wrap{aspect-ratio:1/1; background:var(--bg-panel); overflow:hidden;}
  .p-card .img-wrap img{width:100%; height:100%; object-fit:cover; display:block;}
  .p-icon{width:100%; height:100%; display:flex; align-items:center; justify-content:center;}
  .p-icon svg{width:30%; height:30%; stroke:var(--teal); fill:none; stroke-width:1.3;}
  .p-body{padding:20px 22px 24px;}
  .p-body h3{font-family:'Domine', serif; font-size:19px; font-weight:600; margin:0 0 6px;}
  .p-body p{font-size:13px; color:var(--ink-dim); margin:0; line-height:1.5;}
  @media (max-width:860px){ .product-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:560px){ .product-grid{grid-template-columns:1fr;} }

  .empty-note{text-align:center; padding:60px 0; color:var(--label); font-family:'IBM Plex Mono', monospace; font-size:13px; letter-spacing:0.06em; text-transform:uppercase;}
</style>
</head>
<body>

<header>
  <div class="navbar">
    <a href="index.html" class="wordmark"><img src="assets/logo/mark.png" alt="Kubbe İstanbul"></a>
    <div class="navlinks">
      <a href="index.html#turlar" data-i18n="nav_shoots">Çekimler</a>
      <a href="index.html#galeri" data-i18n="nav_gallery">Galeri</a>
      <a href="index.html#hakkimizda" data-i18n="nav_about">Hakkımızda</a>
      <a href="https://wa.me/905327207916" target="_blank" rel="noopener" style="color:#1a8a45;" data-i18n="nav_whatsapp">WhatsApp</a>
      <div class="lang-switch" id="langSwitch"></div>
      <a href="teklif.html" class="cta-link" data-i18n="nav_reserve">Rezervasyon</a>
    </div>
  </div>
</header>

<section class="page-hero">
  <div class="wrap">
    <div class="breadcrumb"><a href="index.html" data-i18n="breadcrumb_home">Ana Sayfa</a> / <span id="catName">Çekim</span></div>
    <h1 id="catTitle">Çekimler</h1>
    <p id="catDesc"></p>
  </div>
</section>

<section style="padding-top:0;">
  <div class="wrap">
    <div class="product-grid" id="productGrid"></div>
  </div>
</section>

<footer>
  <div class="wrap foot-inner">
    <span class="foot-word">KUBBE İSTANBUL</span>
    <span class="foot-meta" data-i18n="footer_tagline">Teras Fotoğraf Deneyimi</span>
    <span class="foot-meta">© 2026 Kubbe İstanbul</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/shared.js?v=2"></script>
<script src="assets/i18n.js?v=1"></script>
<script>
const CUR_LANG = getLang();
applyStaticTranslations();
renderLangSwitcher('langSwitch');

async function init(){
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug');
  const grid = document.getElementById('productGrid');
  if (!slug) { grid.innerHTML = '<div class="empty-note">'+t('not_found_category')+'</div>'; return; }

  const { data: cat, error: catErr } = await sb.from('kubbe_categories').select('*').eq('slug', slug).maybeSingle();
  if (catErr || !cat) {
    document.getElementById('catTitle').textContent = t('not_found_category');
    grid.innerHTML = '<div class="empty-note">'+t('not_found_category_body')+'</div>';
    return;
  }
  const catName = colValue(cat, 'name', CUR_LANG);
  const catDesc = colValue(cat, 'description', CUR_LANG);
  document.title = catName + ' — KUBBE İSTANBUL';
  document.getElementById('catName').textContent = catName;
  document.getElementById('catTitle').textContent = catName;
  document.getElementById('catDesc').textContent = catDesc;

  const { data: tours, error: tourErr } = await sb.from('kubbe_tours')
    .select('*').eq('category_id', cat.id).order('sort_order');

  if (tourErr || !tours || tours.length === 0) {
    grid.innerHTML = '<div class="empty-note">'+t('empty_category')+'</div>';
    return;
  }

  grid.innerHTML = tours.map(tr => {
    const img = publicImageUrl(tr.image_url);
    const title = colValue(tr, 'title', CUR_LANG);
    const duration = colValue(tr, 'duration', CUR_LANG);
    const media = img
      ? '<div class="img-wrap"><img src="'+img+'" alt="'+escapeHtml(title)+'" loading="lazy"></div>'
      : '<div class="img-wrap"><div class="p-icon">'+categoryIcon(cat.slug)+'</div></div>';
    return '<a class="p-card" href="tur.html?slug='+encodeURIComponent(tr.slug)+'">'+
      media +
      '<div class="p-body"><h3>'+escapeHtml(title)+'</h3>'+
      (duration ? '<p>'+escapeHtml(duration)+'</p>' : '') +
      '</div></a>';
  }).join('');
}
init();
</script>
</body>
</html>
