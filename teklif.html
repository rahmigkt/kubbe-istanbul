<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervasyon — KUBBE İSTANBUL</title>
<link rel="icon" href="assets/logo/mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Domine:wght@500;600;700&family=Nunito+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/brand.css?v=3">
<style>
  .form-page{padding:150px 0 100px;}
  .form-page h1{font-family:'Domine', serif; font-weight:600; font-size:clamp(32px,4.5vw,52px); margin:0 0 14px;}
  .form-page .lead{color:var(--ink-dim); font-size:16px; max-width:560px; margin:0 0 48px;}
  .form-wrap{max-width:620px;}
  .field{margin-bottom:22px; display:flex; flex-direction:column; gap:8px;}
  .field label{font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--label);}
  .field input, .field select, .field textarea{
    background:var(--bg-panel); border:1px solid var(--hairline-strong); color:var(--ink);
    padding:13px 14px; font-family:'Nunito Sans', sans-serif; font-size:15px;
  }
  .field textarea{min-height:110px; resize:vertical;}
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--coral);}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  @media (max-width:560px){ .grid2{grid-template-columns:1fr;} }
  .form-msg{margin-top:18px; font-family:'IBM Plex Mono', monospace; font-size:13px;}
  .form-msg.ok{color:var(--teal-light);}
  .form-msg.err{color:#e07a5f;}
</style>
</head>
<body>

<header>
  <div class="navbar">
    <a href="index.html" class="wordmark"><img src="assets/logo/mark.png" alt="Kubbe İstanbul"></a>
    <div class="navlinks">
      <a href="index.html#turlar" data-i18n="nav_shoots">Çekimler</a>
      <a href="index.html#galeri" data-i18n="nav_gallery">Galeri</a>
      <a href="index.html#hakkimizda" data-i18n="nav_about">Hakkımızda</a>
      <a href="https://wa.me/905327207916" target="_blank" rel="noopener" style="color:#1a8a45;" data-i18n="nav_whatsapp">WhatsApp</a>
      <div class="lang-switch" id="langSwitch"></div>
      <a href="teklif.html" class="cta-link" data-i18n="nav_reserve">Rezervasyon</a>
    </div>
  </div>
</header>

<section class="form-page">
  <div class="wrap">
    <h1 data-i18n="form_title">Çekiminizi Ayırtın</h1>
    <p class="lead" data-i18n="form_lead">Formu doldurun, size Instagram veya WhatsApp üzerinden en kısa sürede dönüş yapalım. Tarih kesinleşmemişse tahmini bilgi de yeterli.</p>
    <div class="form-wrap">
      <form id="teklifForm">
        <div class="grid2">
          <div class="field"><label data-i18n="form_name">Ad Soyad</label><input type="text" name="ad_soyad" required></div>
          <div class="field"><label data-i18n="form_email">E-posta</label><input type="email" name="email" required></div>
        </div>
        <div class="grid2">
          <div class="field"><label data-i18n="form_phone">Telefon</label><input type="tel" name="telefon"></div>
          <div class="field"><label data-i18n="form_date">Tercih Edilen Tarih</label><input type="date" name="tarih"></div>
        </div>
        <div class="grid2">
          <div class="field"><label data-i18n="form_shoot">İlgilendiğiniz Çekim</label><select name="tur" id="turSelect"><option value="" data-i18n="form_shoot_placeholder">Seçiniz (opsiyonel)</option></select></div>
          <div class="field"><label data-i18n="form_group_size">Kişi Sayısı</label><input type="text" name="kisi_sayisi" placeholder="örn. 2 yetişkin"></div>
        </div>
        <div class="field"><label data-i18n="form_message">Mesajınız</label><textarea name="mesaj" placeholder="Özel istekleriniz, ilgi alanlarınız..."></textarea></div>
        <input type="hidden" name="hedef_email" id="hedefEmail">
        <div style="display:flex; gap:14px; flex-wrap:wrap;">
          <button type="submit" class="btn btn-solid" data-i18n="form_submit">Rezervasyon Talebi Gönder →</button>
          <button type="button" id="whatsappBtn" class="btn btn-line" style="border-color:#25D366; color:#1a8a45;" data-i18n="form_whatsapp_btn">WhatsApp ile Gönder →</button>
        </div>
        <div class="form-msg" id="formMsg"></div>
      </form>
    </div>
  </div>
</section>

<footer>
  <div class="wrap foot-inner">
    <span class="foot-word">KUBBE İSTANBUL</span>
    <span class="foot-meta" data-i18n="footer_tagline">Teras Fotoğraf Deneyimi</span>
    <span class="foot-meta">© 2026 Kubbe İstanbul</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/shared.js?v=2"></script>
<script src="assets/i18n.js?v=1"></script>
<script>
const CUR_LANG = getLang();
applyStaticTranslations();
renderLangSwitcher('langSwitch');

async function init(){
  const { data: emailRow } = await sb.from('kubbe_site_content').select('value').eq('key','contact_email').maybeSingle();
  document.getElementById('hedefEmail').value = (emailRow && emailRow.value) || '';

  const { data: phoneRow } = await sb.from('kubbe_site_content').select('value').eq('key','contact_phone').maybeSingle();
  window.kubbePhoneDigits = ((phoneRow && phoneRow.value) || '').replace(/\D/g,'').slice(-10);

  const { data: tours } = await sb.from('kubbe_tours').select('slug, title, title_en, title_fr, title_ar, title_es').order('sort_order');
  const select = document.getElementById('turSelect');
  (tours || []).forEach(tr => {
    const label = colValue(tr, 'title', CUR_LANG);
    const opt = document.createElement('option');
    opt.value = label; opt.textContent = label;
    select.appendChild(opt);
  });
  const params = new URLSearchParams(location.search);
  const preselect = params.get('tur');
  if (preselect) {
    const match = (tours || []).find(tr => tr.slug === preselect);
    if (match) select.value = colValue(match, 'title', CUR_LANG);
  }
}
init();

document.getElementById('whatsappBtn').addEventListener('click', function(){
  const form = document.getElementById('teklifForm');
  const fd = new FormData(form);
  const adSoyad = (fd.get('ad_soyad') || '').toString().trim();
  const telefon = (fd.get('telefon') || '').toString().trim();
  const tarih = (fd.get('tarih') || '').toString().trim();
  const tur = (fd.get('tur') || '').toString().trim();
  const kisi = (fd.get('kisi_sayisi') || '').toString().trim();
  const mesaj = (fd.get('mesaj') || '').toString().trim();

  if (!adSoyad) {
    const msg = document.getElementById('formMsg');
    msg.textContent = t('form_whatsapp_need_name');
    msg.className = 'form-msg err';
    return;
  }

  let text = 'Merhaba, Kubbe İstanbul üzerinden rezervasyon talebim var:\n';
  text += 'Ad Soyad: ' + adSoyad + '\n';
  if (telefon) text += 'Telefon: ' + telefon + '\n';
  if (tarih) text += 'Tercih Edilen Tarih: ' + tarih + '\n';
  if (tur) text += 'İlgilenilen Çekim: ' + tur + '\n';
  if (kisi) text += 'Kişi Sayısı: ' + kisi + '\n';
  if (mesaj) text += 'Mesaj: ' + mesaj + '\n';

  const phone = window.kubbePhoneDigits;
  const url = 'https://wa.me/' + (phone ? '90' + phone : '') + '?text=' + encodeURIComponent(text);
  window.open(url, '_blank');
});

document.getElementById('teklifForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const msg = document.getElementById('formMsg');
  msg.textContent = t('form_sending'); msg.className = 'form-msg';
  const formData = new FormData(e.target);
  try {
    const res = await fetch('gonder.php', { method: 'POST', body: formData });
    const text = await res.text();
    if (text.trim() === 'OK') {
      msg.textContent = t('form_success');
      msg.className = 'form-msg ok';
      e.target.reset();
    } else {
      msg.textContent = t('form_error');
      msg.className = 'form-msg err';
    }
  } catch (err) {
    msg.textContent = t('form_conn_error');
    msg.className = 'form-msg err';
  }
});
</script>
</body>
</html>
