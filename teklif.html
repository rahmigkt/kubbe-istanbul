<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervasyon — KUBBE İSTANBUL</title>
<link rel="icon" href="assets/logo/mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Domine:wght@500;600;700&family=Nunito Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/brand.css">
<style>
  .form-page{padding:150px 0 100px;}
  .form-page h1{font-family:'Domine', serif; font-weight:600; font-size:clamp(32px,4.5vw,52px); margin:0 0 14px;}
  .form-page .lead{color:var(--ink-dim); font-size:16px; max-width:560px; margin:0 0 48px;}
  .form-wrap{max-width:620px;}
  .field{margin-bottom:22px; display:flex; flex-direction:column; gap:8px;}
  .field label{font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--label);}
  .field input, .field select, .field textarea{
    background:var(--bg-panel); border:1px solid var(--hairline-strong); color:var(--ink);
    padding:13px 14px; font-family:'Nunito Sans', sans-serif; font-size:15px;
  }
  .field textarea{min-height:110px; resize:vertical;}
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--coral);}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  @media (max-width:560px){ .grid2{grid-template-columns:1fr;} }
  .form-msg{margin-top:18px; font-family:'IBM Plex Mono', monospace; font-size:13px;}
  .form-msg.ok{color:var(--teal-light);}
  .form-msg.err{color:#e07a5f;}
</style>
</head>
<body>

<header>
  <div class="navbar">
    <a href="index.html" class="wordmark"><img src="assets/logo/mark.png" alt="Kubbe İstanbul"></a>
    <div class="navlinks">
      <a href="index.html#turlar">Turlar</a>
      <a href="index.html#hakkimizda">Hakkımızda</a>
      <a href="teklif.html" class="cta-link">Rezervasyon</a>
    </div>
  </div>
</header>

<section class="form-page">
  <div class="wrap">
    <h1>Çekiminizi Ayırtın</h1>
    <p class="lead">Formu doldurun, size Instagram veya WhatsApp üzerinden en kısa sürede dönüş yapalım. Tarih kesinleşmemişse tahmini bilgi de yeterli.</p>
    <div class="form-wrap">
      <form id="teklifForm">
        <div class="grid2">
          <div class="field"><label>Ad Soyad</label><input type="text" name="ad_soyad" required></div>
          <div class="field"><label>E-posta</label><input type="email" name="email" required></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Telefon</label><input type="tel" name="telefon"></div>
          <div class="field"><label>Tercih Edilen Tarih</label><input type="date" name="tarih"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>İlgilendiğiniz Çekim</label><select name="tur" id="turSelect"><option value="">Seçiniz (opsiyonel)</option></select></div>
          <div class="field"><label>Kişi Sayısı</label><input type="text" name="kisi_sayisi" placeholder="örn. 2 yetişkin"></div>
        </div>
        <div class="field"><label>Mesajınız</label><textarea name="mesaj" placeholder="Özel istekleriniz, ilgi alanlarınız..."></textarea></div>
        <input type="hidden" name="hedef_email" id="hedefEmail">
        <button type="submit" class="btn btn-solid">Rezervasyon Talebi Gönder →</button>
        <div class="form-msg" id="formMsg"></div>
      </form>
    </div>
  </div>
</section>

<footer>
  <div class="wrap foot-inner">
    <span class="foot-word">KUBBE İSTANBUL</span>
    <span class="foot-meta">Özel Rehberli Turlar</span>
    <span class="foot-meta">© 2026 Kubbe İstanbul</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/shared.js"></script>
<script>
async function init(){
  const { data: emailRow } = await sb.from('kubbe_site_content').select('value').eq('key','contact_email').maybeSingle();
  document.getElementById('hedefEmail').value = (emailRow && emailRow.value) || '';

  const { data: tours } = await sb.from('kubbe_tours').select('slug, title').order('sort_order');
  const select = document.getElementById('turSelect');
  (tours || []).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.title; opt.textContent = t.title;
    select.appendChild(opt);
  });
  const params = new URLSearchParams(location.search);
  const preselect = params.get('tur');
  if (preselect) {
    const match = (tours || []).find(t => t.slug === preselect);
    if (match) select.value = match.title;
  }
}
init();

document.getElementById('teklifForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const msg = document.getElementById('formMsg');
  msg.textContent = 'Gönderiliyor…'; msg.className = 'form-msg';
  const formData = new FormData(e.target);
  try {
    const res = await fetch('gonder.php', { method: 'POST', body: formData });
    const text = await res.text();
    if (text.trim() === 'OK') {
      msg.textContent = 'Talebiniz alındı, teşekkürler! En kısa sürede dönüş yapacağız.';
      msg.className = 'form-msg ok';
      e.target.reset();
    } else {
      msg.textContent = 'Bir sorun oluştu, lütfen tekrar deneyin.';
      msg.className = 'form-msg err';
    }
  } catch (err) {
    msg.textContent = 'Bağlantı hatası, lütfen tekrar deneyin.';
    msg.className = 'form-msg err';
  }
});
</script>
</body>
</html>
